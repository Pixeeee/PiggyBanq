services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: piggybanq
      POSTGRES_PASSWORD: piggybanq_dev
      POSTGRES_DB: piggybanq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

